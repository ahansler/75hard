function fmt(d){return d.toISOString().split("T")[0]}function td(){return fmt(new Date())}
function aD(s,n){const d=new Date(s+"T12:00:00");d.setDate(d.getDate()+n);return fmt(d)}
function dN(a,b){return Math.floor((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/864e5)+1}
function sD(s){return new Date(s+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"})}
function sM(s){return new Date(s+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}
function isD(d){return d&&TASKS.every(t=>d[t.key]===true)}
function taskCount(d){if(!d)return 0;return TASKS.filter(t=>d[t.key]).length}

function hmColor(count,accent){
  if(count===0)return'var(--surface)';
  const opacities=[0,.15,.28,.42,.58,.78,1];
  return `${accent}${Math.round(opacities[count]*255).toString(16).padStart(2,'0')}`;
}

h+=`<div class="card" style="margin-top:16px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px">Progress</span><span style="font-size:11px;color:var(--muted);font-weight:700">${pc}%</span></div><div class="ptrk"><div class="pfil" style="width:${pc}%;background:linear-gradient(90deg,${ar},${ag})"></div></div><div style="display:flex;justify-content:space-between;margin-top:8px"><span style="font-size:10px;color:var(--faint)">Day 1</span><span style="font-size:10px;color:var(--faint)">Next: Day ${nM}</span><span style="font-size:10px;color:var(--faint)">Day 75</span></div></div>`}

if(SV==="calendar"&&!SD){

["S","M","T","W","T","F","S"].forEach(d=>{h+=`<div class="chdr">${d}</div>`});
const pad=new Date(S.startDate+"T12:00:00").getDay();for(let i=0;i<pad;i++)h+='<div></div>';
for(let i=0;i<75;i++){const ds=aD(S.startDate,i),iF=ds>t,iT=ds===t;

const bg=iF?'var(--bg)':hmColor(tc,ar);
const clr=cm?'white':tc>=3?'white':iF?'var(--void)':'var(--muted)';
h+=`<button class="cday" style="background:${bg};color:${clr};border:${iT?`2px solid white`:'1px solid var(--surface)'};cursor:${iF?'default':'pointer'}${iF?';opacity:.4':''}" ${iF?'':`onclick="sSD('${ds}')"`} title="${tc}/6">${i+1}</button>`}

h+=`<div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:20px"><span style="font-size:10px;color:var(--dim);margin-right:4px">Less</span>`;
for(let i=0;i<=6;i++){h+=`<div style="width:14px;height:14px;border-radius:3px;background:${i===0?'var(--surface)':hmColor(i,ar)}"></div>`}
h+=`<span style="font-size:10px;color:var(--dim);margin-left:4px">More</span></div>`;
// Streak visualization
h+=`<div class="card"><div class="clbl">Streak History</div><div style="display:flex;gap:2px;flex-wrap:wrap">`;
for(let i=0;i<75;i++){const ds=aD(S.startDate,i);if(ds>t)break;const cm=isD(gC(ds,P));
h+=`<div style="width:${Math.max(100/75,1.2)}%;min-width:4px;height:24px;border-radius:2px;background:${cm?ar:'var(--border)'}" title="Day ${i+1}"></div>`}
h+=`</div></div>`;
h+=`<div class="card" style="text-align:center"><div style="font-size:12px;color:var(--dim);margin-bottom:4px">Challenge Period</div><div style="font-size:15px;font-weight:700">${sM(S.startDate)} → ${sM(eD)}</div></div>`}

if(SV==="stats"){
h+=`<div class="section-title">STATS</div><div class="cmpr">`;
[{w:"him",l:"Adam",s:hS,tt:hT,c:"#E07A5F"},{w:"her",l:"Brooke",s:sS2,tt:sT,c:"#7B68AE"}].forEach(p=>{
h+=`<div class="card cmprc"><div style="font-size:13px;font-weight:700;color:${p.c};margin-bottom:12px">${p.l}</div><div style="font-family:var(--fd);font-size:40px;color:${p.c}">${p.tt}</div><div class="slbl" style="margin-bottom:12px">Days Done</div><div class="btrk"><div class="bfil" style="width:${(p.tt/75)*100}%;background:${p.c}"></div></div><div class="mstats"><div><div class="msnum">${p.s}</div><div class="mslbl">Streak</div></div><div><div class="msnum">${75-p.tt}</div><div class="mslbl">Left</div></div><div><div class="msnum">${Math.round((p.tt/75)*100)}%</div><div class="mslbl">Done</div></div></div></div>`});h+='</div>';
const mx=Math.min(75,Math.max(0,dn));

TASKS.forEach(tk=>{let d2=0;for(let i=0;i<mx;i++)if(gC(aD(S.startDate,i),P)[tk.key])d2++;const p2=mx>0?Math.round(d2/mx*100):0;

MS.forEach(m=>{const r=tot>=m;h+=`<div class="mil" style="${r?`color:${ar};border-color:${ar};background:${ar}18`:''}">${r?'✓ ':''}Day ${m}</div>`});
h+='</div></div>'}}

// ═══ MEALS ═══
if(V==="meals"){
h+=`<div class="ptog"><button class="pbtn ${P==='him'?'ah':''}" onclick="sP('him')">Adam</button><button class="pbtn ${P==='her'?'as':''}" onclick="sP('her')">Brooke</button></div>`;
h+=`<div class="stabs"><button class="stab ${SV==='targets'?'act':''}" onclick="sSV('targets')">Targets</button><button class="stab ${SV==='week'?'act':''}" onclick="sSV('week')">Week Plan</button><button class="stab ${SV==='recipes'?'act':''}" onclick="sSV('recipes')">Recipes</button></div>`;
if(SV==="targets"){
h+=`<div class="tip-card"><div class="tip-title">⚡ DASH</div><div class="tip-text"><strong>Adam:</strong> 2,400–2,600 cal/day<br><strong>Brooke:</strong> 1,600–1,800 cal/day</div></div>`;
h+=`<div class="section-title">${nm}'s Targets</div>`;
(P==="him"?TH:TS).forEach(tg=>{h+=`<div class="tgt-row"><span class="tgt-icon">${tg.i}</span><div class="tgt-info"><div class="tgt-grp">${tg.g}</div><div class="tgt-note">${tg.n}</div></div><div class="tgt-val" style="color:${ar};background:${ar}15">${tg.s}</div></div>`})}
if(SV==="week"){
h+=`<div class="wk-tog"><button class="wk-btn ${WK===1?'act':''}" onclick="sWK(1)">Week 1</button><button class="wk-btn ${WK===2?'act':''}" onclick="sWK(2)">Week 2</button></div>`;
h+=`<div class="day-row">${WEEK.map((d,i)=>`<button class="dbtn ${MD===i?'act':''}" onclick="sMD(${i})">${d.day.slice(0,3)}</button>`).join('')}</div><div class="section-title">${WEEK[MD].day}</div>`;
Object.entries(WEEK[MD].meals).forEach(([ml,info])=>{h+=`<div class="meal-card"><div class="meal-type">${ml}</div><div class="meal-name">${info.n}</div><div class="meal-cals"><span style="color:var(--him);font-weight:600">Adam: ${info.h}</span><span style="color:var(--her);font-weight:600">Brooke: ${info.s}</span></div><div class="meal-her">✨ Brooke: ${info.sn}</div><div class="meal-prep">⏱ ${info.p}</div></div>`});
const hTot=Object.values(WEEK[MD].meals).reduce((s,m)=>s+m.h,0),sTot=Object.values(WEEK[MD].meals).reduce((s,m)=>s+m.s,0);
h+=`<div class="card" style="text-align:center"><div style="display:flex;justify-content:center;gap:24px"><div><div style="font-family:var(--fd);font-size:28px;color:var(--him)">${hTot}</div><div style="font-size:10px;color:var(--dim)">Adam</div></div><div><div style="font-family:var(--fd);font-size:28px;color:var(--her)">${sTot}</div><div style="font-size:10px;color:var(--dim)">Brooke</div></div></div></div>`}
if(SV==="recipes"){
h+=`<div class="filter-row">${["All","Breakfast","Lunch","Dinner","Meal Prep"].map(f=>`<button class="fbtn ${MF===f?'act':''}" onclick="sMF('${f}')">${f}</button>`).join('')}</div>`;
(MF==="All"?RECIPES:RECIPES.filter(r=>r.tg.includes(MF))).forEach(r=>{const ex=ER===r.id;
h+=`<div class="recipe-card" onclick="sER(${r.id})"><div style="display:flex;justify-content:space-between"><div style="flex:1"><div style="font-size:15px;font-weight:700;margin-bottom:6px">${r.nm}</div><div style="margin-bottom:6px">${r.tg.map(t=>`<span class="r-tag">${t}</span>`).join('')}</div><div class="r-meta">⏱ ${r.tm} · Serves ${r.sv}</div><div class="r-cals"><span style="color:var(--him);font-weight:600">Adam: ${r.ch}</span><span style="color:var(--her);font-weight:600">Brooke: ${r.cs}</span></div></div><span style="font-size:16px;color:var(--dim);transform:${ex?'rotate(180deg)':'none'};transition:transform .2s">▼</span></div>`;
if(ex){h+=`<div class="r-expand" onclick="event.stopPropagation()"><div class="r-portion">✨ ${r.pn}</div><div style="font-size:12px;font-weight:700;margin-bottom:8px">Ingredients</div>`;
r.ig.forEach(ig=>{h+=`<div class="r-ing">${ig}</div>`});h+=`<div style="font-size:12px;font-weight:700;margin:14px 0 8px">Steps</div>`;
r.st.forEach((s,i)=>{h+=`<div class="r-step"><span class="r-snum">${i+1}.</span><span>${s}</span></div>`});h+='</div>'}h+='</div>'})}}

// ═══ PREP ═══
if(V==="prep"){
h+=`<div class="wk-tog"><button class="wk-btn ${WK===1?'act':''}" onclick="sWK(1)">Week 1</button><button class="wk-btn ${WK===2?'act':''}" onclick="sWK(2)">Week 2</button></div>`;

PREP.forEach((p,i)=>{h+=`<div class="prep-card"><div style="display:flex;justify-content:space-between"><div style="flex:1"><div style="font-size:14px;font-weight:700;margin-bottom:6px">${i+1}. ${p.t}</div><div style="font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:8px">${p.d}</div><div class="prep-who">👫 ${p.w}</div></div><div class="prep-time">${p.tm}</div></div></div>`});
h+=`<div class="card"><div class="clbl">🛒 Week ${WK} Groceries</div><div class="grocery-section">${(WK===1?G1:G2).split('\n').map(l=>{const[c,...r]=l.split(': ');return`<strong>${c}:</strong> ${r.join(': ')}`}).join('<br>')}</div></div>`;
h+=`<button class="export-btn" onclick="exportGrocery()">📋 Share / Copy Grocery List</button>`}

// ═══ SNACKS ═══
if(V==="snacks"){

<button class="export-btn" onclick="exportData()" style="margin-top:0;margin-bottom:10px">⬇️ Export Backup (JSON)</button>
<button class="export-btn" onclick="importData()" style="margin-top:0;border-color:var(--her);color:var(--her);background:rgba(123,104,174,0.1)">⬆️ Import Backup</button>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
</div>`;
h+=`<div class="card"><div class="clbl">📊 Data</div>
<div style="font-size:12px;color:var(--dim);line-height:1.8">

<strong>Adam's days completed:</strong> ${hT}/75<br>
<strong>Brooke's days completed:</strong> ${sT}/75<br>

</div></div>`;
h+=`<div class="card"><div class="clbl">⚠️ Danger Zone</div>
<button class="rbtn" style="border-color:#E07A5F44;color:var(--him)" onclick="rC()">Reset All Challenge Data</button></div>`}

h+=`</div><div class="bnav">
<button class="${V==='tracker'?'act':''}" onclick="sV('tracker')"><span>🔥</span>Track</button>
<button class="${V==='meals'?'act':''}" onclick="sV('meals')"><span>🍽</span>Meals</button>
<button class="${V==='prep'?'act':''}" onclick="sV('prep')"><span>🔪</span>Prep</button>
<button class="${V==='snacks'?'act':''}" onclick="sV('snacks')"><span>🍏</span>Snacks</button>
<button class="${V==='settings'?'act':''}" onclick="sV('settings')"><span>⚙️</span>Settings</button></div>`;
el.innerHTML=h}
</script>
