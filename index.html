var dlI=[0,Math.floor(pts.length/2),pts.length-1],dlH="";dlI.forEach(function(i){if(pts[i])dlH+='<text x="'+pts[i].x+'" y="'+(cH-5)+'" fill="#666" font-size="9" text-anchor="middle">'+sm(pts[i].d)+"</text>"});
h+='<div class="card"><div class="clbl">Trend</div><svg viewBox="0 0 '+cW+" "+cH+'" style="width:100%;height:auto">'+gH+'<defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+mc+'" stop-opacity="0.3"/><stop offset="100%" stop-color="'+mc+'" stop-opacity="0.02"/></linearGradient></defs><path d="'+areaD+'" fill="url(#wg)"/><path d="'+pathD+'" fill="none" stroke="'+mc+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
pts.forEach(function(p){h+='<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+mc+'" stroke="var(--bg)" stroke-width="2"/>'});
h+=dlH+"</svg></div>"}}

h+='<div class="section-title">History</div>';
if(!wts.length){h+='<div class="card" style="text-align:center"><div style="color:var(--dm);font-size:13px">No entries yet.</div></div>'}
else{var rec=wts.slice().reverse().slice(0,30);rec.forEach(function(e,i){

h+='<div class="wt-entry"><div style="font-size:12px;color:var(--dm)">'+sd(e[0])+", "+sm(e[0])+'</div><div style="display:flex;align-items:center;gap:10px">'+(df?'<span style="font-size:11px;color:'+dfc+'">'+(parseFloat(df)>0?"+":"")+df+"</span>":"")+'<div style="font-family:var(--fd);font-size:20px;color:'+mc+'">'+e[1]+'</div><button style="background:none;border:none;color:var(--vd);font-size:14px;padding:4px" onclick="delWt(\''+e[0]+'\')">x</button></div></div>'})}
} // end weight
} // end tracker

// MEALS
if(V==="meals"){

if(SV==="targets"){

(P==="him"?TH:TB).forEach(function(tg){h+='<div class="tgt-row"><span class="tgt-icon">'+tg.i+'</span><div class="tgt-info"><div class="tgt-grp">'+tg.g+'</div><div class="tgt-note">'+tg.n+'</div></div><div style="font-weight:700;font-size:12px;padding:2px 8px;border-radius:6px;color:'+ar+';background:'+ar+'15">'+tg.s+"</div></div>"})}

h+='<div class="card" style="text-align:center"><div style="display:flex;justify-content:center;gap:24px"><div><div style="font-family:var(--fd);font-size:28px;color:var(--hm)">'+aT+'</div><div style="font-size:10px;color:var(--dm)">Adam</div></div><div><div style="font-family:var(--fd);font-size:28px;color:var(--hr)">'+bT+'</div><div style="font-size:10px;color:var(--dm)">Brooke</div></div></div></div>'}

if(SV==="recipes"){

fR.forEach(function(r){var ex=ER===r.id;
h+='<div class="recipe-card" onclick="sER('+r.id+')"><div style="display:flex;justify-content:space-between"><div style="flex:1"><div style="font-size:15px;font-weight:700;margin-bottom:6px">'+r.nm+'</div><div style="margin-bottom:6px">'+r.tg.map(function(t){return'<span class="r-tag">'+t+"</span>"}).join("")+'</div><div style="font-size:11px;color:var(--dm)">'+r.tm+" | Serves "+r.sv+'</div><div style="display:flex;gap:10px;margin-top:4px;font-size:11px"><span style="color:var(--hm);font-weight:600">Adam: '+r.ca+'</span><span style="color:var(--hr);font-weight:600">Brooke: '+r.cb+"</span></div></div><span style=\"font-size:16px;color:var(--dm);transform:"+(ex?"rotate(180deg)":"none")+'\">&#9660;</span></div>';
if(ex){h+='<div class="r-expand" onclick="event.stopPropagation()"><div class="r-portion">'+r.pn+'</div><div style="font-size:12px;font-weight:700;margin-bottom:8px">Ingredients</div>';
r.ig.forEach(function(ig){h+='<div class="r-ing">'+ig+"</div>"});
h+='<div style="font-size:12px;font-weight:700;margin:14px 0 8px">Steps</div>';
r.st.forEach(function(s,i){h+='<div class="r-step"><span class="r-snum">'+(i+1)+".</span><span>"+s+"</span></div>"});
h+="</div>"}h+="</div>"})}}

// PREP
if(V==="prep"){
h+='<div class="wk-tog"><button class="wk-btn '+(WK===1?"act":"")+'" onclick="sWK(1)">Week 1</button><button class="wk-btn '+(WK===2?"act":"")+'" onclick="sWK(2)">Week 2</button></div>';

if(V==="settings"){
h+='<div class="section-title">SETTINGS</div><div class="card"><div class="clbl">Backup</div><button class="export-btn" style="margin-top:0;margin-bottom:10px" onclick="exportData()">Export Backup</button><button class="export-btn" style="margin-top:0;border-color:var(--hr);color:var(--hr);background:rgba(123,104,174,0.1)" onclick="importData()">Import Backup</button><input type="file" id="impF" accept=".json" style="display:none" onchange="handleImp(event)"></div>';
h+='<div class="card"><div class="clbl">Data</div><div style="font-size:12px;color:var(--dm);line-height:1.8"><strong>Start:</strong> '+(S.startDate||"Not set")+"<br><strong>Adam:</strong> "+hT+"/75<br><strong>Brooke:</strong> "+sT+"/75<br><strong>Status:</strong> "+(online?"Online":"Offline ("+oQ.length+" queued)")+"</div></div>";
h+='<div class="card"><div class="clbl">Danger Zone</div><button class="rbtn" style="border-color:#E07A5F44;color:var(--hm)" onclick="rC()">Reset All Data</button></div>'}

h+='</div><div class="bnav">';

h+="</div>";
el.innerHTML=h}
