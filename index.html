<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="75 HARD">
<meta name="theme-color" content="#0D0D0D">
<title>75 HARD</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0D0D;--surface:#1A1A1A;--border:#2A2A2A;--text:#F5F0EB;--muted:#888;--dim:#666;--faint:#555;--ghost:#444;--void:#333;--him:#E07A5F;--her:#7B68AE;--success:#4ADE80;--warn:#D4A373;--accent2:#2D6A4F;--fd:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
html,body{height:100%;overflow-x:hidden}
body{font-family:var(--fb);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;padding-top:var(--st)}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none}input{font-family:inherit;-webkit-appearance:none}
.ctr{max-width:500px;margin:0 auto;padding:0 20px 120px}
.hdr{padding:20px 20px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;max-width:500px;margin:0 auto}
.hdr h1{font-family:var(--fd);font-size:28px;letter-spacing:4px;line-height:1}
.hdr-sub{font-size:12px;color:var(--dim);margin-top:2px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 calc(8px + var(--sb));z-index:100}
.bnav button{background:none;border:none;color:var(--ghost);font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;min-width:60px}
.bnav button.act{color:var(--him)}
.bnav button span{font-size:20px}
.ptog{display:flex;border-radius:10px;overflow:hidden;border:1px solid var(--border);margin:12px 0}
.pbtn{flex:1;padding:12px;border:none;font-size:13px;font-weight:500;background:var(--surface);color:var(--dim);transition:all .2s}
.pbtn.ah{background:var(--him);color:white;font-weight:700}
.pbtn.as{background:var(--her);color:white;font-weight:700}
.stabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.stab{padding:10px;border-radius:8px;border:none;font-size:12px;font-weight:500;background:transparent;color:var(--dim);transition:all .2s;white-space:nowrap}
.stab.act{background:var(--border);color:var(--text);font-weight:700}
.card{background:var(--surface);border-radius:14px;padding:20px;border:1px solid var(--border);margin-bottom:12px}
.clbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px}
.sban{background:var(--surface);border-radius:14px;padding:20px;border:1px solid var(--border);display:flex;justify-content:space-around;text-align:center;margin-bottom:16px}
.snum{font-family:var(--fd);font-size:36px}.slbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px}
.sdiv{width:1px;background:var(--border)}
.tbtn{width:100%;display:flex;align-items:center;gap:14px;padding:16px;margin-bottom:8px;border-radius:12px;border:1px solid var(--border);background:var(--surface);text-align:left;transition:all .15s}
.tbox{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--border);transition:all .15s}
.ttl{font-size:14px;font-weight:700;transition:color .15s}.tdsc{font-size:11px;color:var(--dim);margin-top:2px}
.ptrk{height:8px;background:var(--border);border-radius:4px;overflow:hidden}.pfil{height:100%;border-radius:4px;transition:width .5s ease}
.cgrd{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px}
.chdr{text-align:center;font-size:10px;color:var(--faint);padding:4px 0;font-weight:700}
.cday{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;transition:all .15s;border:1px solid var(--surface)}
.cmpr{display:flex;gap:8px;margin-bottom:16px}.cmprc{flex:1;text-align:center}
.mstats{display:flex;justify-content:space-between;margin-top:12px}
.msnum{font-family:var(--fd);font-size:22px;color:var(--text)}.mslbl{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:1px}
.btrk{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:12px}.bfil{height:100%;border-radius:3px;transition:width .5s}
.bdr{margin-bottom:12px}.bdhdr{display:flex;justify-content:space-between;margin-bottom:4px}
.bdlbl{font-size:12px;color:var(--muted)}.bdpct{font-size:12px;color:var(--muted);font-weight:700}
.bdtrk{height:4px;background:var(--border);border-radius:2px;overflow:hidden}.bdfil{height:100%;border-radius:2px;transition:width .5s}
.mils{display:flex;flex-wrap:wrap;gap:8px}
.mil{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid var(--border);background:var(--bg);color:var(--ghost)}
.setup-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.setup-box{max-width:400px;width:100%;text-align:center}
.stitle{font-family:var(--fd);font-size:48px;letter-spacing:6px;margin-bottom:8px}
.ssub{font-size:14px;color:var(--muted);margin-bottom:40px;line-height:1.6}
.scard{background:var(--surface);border-radius:16px;padding:32px 24px;border:1px solid var(--border)}
.sinp{width:100%;padding:14px;border-radius:10px;border:1px solid var(--void);background:var(--bg);color:var(--text);font-size:16px;margin-bottom:20px;outline:none}
.sbtn{width:100%;padding:16px;border-radius:10px;border:none;font-size:14px;font-weight:700;font-family:var(--fd);letter-spacing:3px;background:var(--him);color:white;cursor:pointer}
.rbtn{width:100%;padding:14px;border-radius:10px;border:1px solid var(--void);background:transparent;color:var(--faint);font-size:12px;margin-top:8px}
.sftr{margin-top:32px;font-size:12px;color:var(--faint);line-height:1.6}
.dcbdg{font-size:12px;font-weight:700;color:var(--success);background:rgba(74,222,128,0.1);padding:6px 14px;border-radius:20px}
.bbtn{padding:6px 14px;border-radius:8px;border:1px solid var(--void);background:transparent;color:var(--muted);font-size:12px}
.dhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.dttl{font-family:var(--fd);font-size:22px;letter-spacing:2px}.dsub{font-size:12px;color:var(--dim)}
.lds{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.ldst{font-family:var(--fd);font-size:24px;letter-spacing:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.puls{animation:pulse 1.5s infinite}
.tgt-row{display:flex;align-items:center;padding:12px 16px;background:var(--surface);border-radius:10px;border:1px solid var(--border);margin-bottom:8px}
.tgt-icon{font-size:20px;margin-right:12px;width:28px;text-align:center}
.tgt-info{flex:1}.tgt-grp{font-weight:700;font-size:13px}.tgt-note{font-size:11px;color:var(--dim)}
.tgt-val{font-weight:700;font-size:12px;padding:2px 8px;border-radius:6px}
.meal-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:10px}
.meal-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:4px}
.meal-name{font-size:14px;font-weight:700;margin-bottom:6px}
.meal-cals{display:flex;gap:10px;margin-bottom:6px;font-size:12px}
.meal-her{font-size:11px;color:var(--her);background:rgba(123,104,174,0.12);padding:5px 10px;border-radius:8px;line-height:1.3}
.meal-prep{font-size:11px;color:var(--dim);margin-top:6px}
.recipe-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:10px;cursor:pointer}
.r-tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;color:var(--accent2);background:rgba(45,106,79,0.15);margin-right:4px;margin-bottom:4px}
.r-meta{font-size:11px;color:var(--dim)}
.r-cals{display:flex;gap:10px;margin-top:4px;font-size:11px}
.r-expand{margin-top:14px;border-top:1px solid var(--border);padding-top:14px}
.r-portion{font-size:11px;color:var(--her);background:rgba(123,104,174,0.12);padding:8px 10px;border-radius:8px;margin-bottom:12px;line-height:1.3}
.r-ing{font-size:12px;padding:3px 0 3px 10px;border-left:2px solid var(--accent2);margin-bottom:4px;line-height:1.4}
.r-step{display:flex;gap:8px;margin-bottom:8px;font-size:12px;line-height:1.5}
.r-snum{font-weight:700;color:var(--accent2);min-width:18px}
.prep-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:10px}
.prep-who{font-size:11px;color:var(--her);background:rgba(123,104,174,0.12);padding:5px 10px;border-radius:8px;margin-top:8px;line-height:1.3}
.prep-time{font-size:11px;font-weight:700;color:var(--accent2);background:rgba(45,106,79,0.1);padding:3px 10px;border-radius:12px;white-space:nowrap}
.snack-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.snack-name{font-size:13px;font-weight:700;margin-bottom:3px}.snack-dash{font-size:11px;color:var(--dim)}
.snack-cal{font-family:var(--fd);font-size:22px;color:var(--her)}.snack-unit{font-size:10px;color:var(--dim)}
.tip-card{background:rgba(212,163,115,0.1);border:1px solid rgba(212,163,115,0.3);border-radius:12px;padding:16px;margin-bottom:12px}
.tip-title{font-size:13px;font-weight:700;color:var(--warn);margin-bottom:6px}
.tip-text{font-size:12px;color:var(--text);line-height:1.6}
.filter-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.fbtn{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:var(--surface);color:var(--dim);font-size:11px;font-weight:600;white-space:nowrap}
.fbtn.act{background:var(--accent2);color:white;border-color:var(--accent2)}
.day-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.dbtn{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--dim);font-size:11px;font-weight:500;white-space:nowrap}
.dbtn.act{border-color:var(--accent2);background:rgba(45,106,79,0.15);color:var(--accent2);font-weight:700}
.section-title{font-family:var(--fd);font-size:18px;letter-spacing:1px;margin:16px 0 12px}
.grocery-section{font-size:12px;color:var(--text);line-height:1.8}
.grocery-section strong{color:var(--muted)}
.wk-tog{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-bottom:14px}
.wk-btn{flex:1;padding:8px;border:none;font-size:12px;font-weight:500;background:var(--surface);color:var(--dim);transition:all .2s}
.wk-btn.act{background:var(--accent2);color:white;font-weight:700}
.export-btn{width:100%;padding:14px;border-radius:10px;border:1px solid var(--accent2);background:rgba(45,106,79,0.1);color:var(--accent2);font-size:13px;font-weight:700;margin-top:12px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{max-width:400px;width:100%;text-align:center}
.g-btn{width:100%;padding:16px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:12px;transition:all .2s}
.g-btn:hover{background:var(--border)}
.g-btn svg{width:20px;height:20px}
.user-bar{display:flex;align-items:center;gap:8px;padding:8px 20px;max-width:500px;margin:0 auto;border-bottom:1px solid var(--border)}
.user-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover}
.user-name{font-size:12px;font-weight:600;flex:1}
.user-out{font-size:10px;color:var(--dim);background:none;border:1px solid var(--void);padding:4px 10px;border-radius:6px}
</style>
</head>
<body>
<div id="app"><div class="lds"><div class="ldst puls">75 HARD</div><div style="font-size:12px;color:var(--dim)">Loading...</div></div></div>
<script type="module">
  import { init } from "./app/main.js";
  init();
</script>
</body>
</html>
