h+=`<div class="filter-row">${["All","Breakfast","Lunch","Dinner","Meal Prep"].map(f=>`<button class="fbtn ${MF===f?'act':''}" onclick="sMF('${f}')">${f}</button>`).join('')}</div>`;
(MF==="All"?RECIPES:RECIPES.filter(r=>r.tg.includes(MF))).forEach(r=>{const ex=ER===r.id;
h+=`<div class="recipe-card" onclick="sER(${r.id})"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="font-size:15px;font-weight:700;margin-bottom:6px">${r.nm}</div><div style="margin-bottom:6px">${r.tg.map(t=>`<span class="r-tag">${t}</span>`).join('')}</div><div class="r-meta">⏱ ${r.tm} · Serves ${r.sv}</div><div class="r-cals"><span style="color:var(--him);font-weight:600">Adam: ${r.ch} cal</span><span style="color:var(--her);font-weight:600">Brooke: ${r.cs} cal</span></div></div><span style="font-size:16px;color:var(--dim);transform:${ex?'rotate(180deg)':'none'};transition:transform .2s">▼</span></div>`;
if(ex){h+=`<div class="r-expand" onclick="event.stopPropagation()"><div class="r-portion">✨ <strong>Portions:</strong> ${r.pn}</div><div style="font-size:12px;font-weight:700;margin-bottom:8px">Ingredients</div>`;
r.ig.forEach(ig=>{h+=`<div class="r-ing">${ig}</div>`});h+=`<div style="font-size:12px;font-weight:700;margin:14px 0 8px">Steps</div>`;
r.st.forEach((s,i)=>{h+=`<div class="r-step"><span class="r-snum">${i+1}.</span><span>${s}</span></div>`});h+='</div>'}h+='</div>'})}}

if(V==="prep"){
h+=`<div class="wk-tog"><button class="wk-btn ${WK===1?'act':''}" onclick="sWK(1)">Week 1</button><button class="wk-btn ${WK===2?'act':''}" onclick="sWK(2)">Week 2</button></div>`;
h+=`<div class="tip-card"><div class="tip-title">🗓 Sunday Couples Prep</div><div class="tip-text">About <strong>3 hours together</strong>. Put on music — this is your weekly ritual.</div></div>`;
h+=`<div class="section-title">Prep Checklist</div>`;
PREP.forEach((p,i)=>{h+=`<div class="prep-card"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="font-size:14px;font-weight:700;margin-bottom:6px">${i+1}. ${p.t}</div><div style="font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:8px">${p.d}</div><div class="prep-who">👫 ${p.w}</div></div><div class="prep-time">${p.tm}</div></div></div>`});
h+=`<div class="card"><div class="clbl">🛒 Week ${WK} Groceries</div><div class="grocery-section">${(WK===1?G1:G2).split('\n').map(l=>{const[cat,...rest]=l.split(': ');return`<strong>${cat}:</strong> ${rest.join(': ')}`}).join('<br>')}</div></div>`;
h+=`<button class="export-btn" onclick="exportGrocery()">📋 Share / Copy Grocery List</button>`}

if(V==="snacks"){
h+=`<div class="tip-card" style="background:rgba(123,104,174,0.1);border-color:rgba(123,104,174,0.3)"><div class="tip-title" style="color:var(--her)">🍏 Brooke's Snack Guide</div><div class="tip-text">At 1,600–1,800 cal: <strong>200–250 cal for snacks</strong> daily. Pick 1–2. Best 30–60 min before Peloton.</div></div>`;
h+=`<div class="section-title">Snack Options</div>`;
SNACKS.forEach(s=>{h+=`<div class="snack-card"><div style="flex:1"><div class="snack-name">${s.n}</div><div class="snack-dash">DASH: ${s.d}</div></div><div style="text-align:right"><div class="snack-cal">${s.c}</div><div class="snack-unit">cal</div></div></div>`});
h+=`<div class="tip-card"><div class="tip-title">💡 Timing</div><div class="tip-text">Mid-morning & mid-afternoon. Snack before Peloton fuels the ride. On yoga days, skip afternoon snack if not hungry.</div></div>`}

h+=`</div><div class="bnav">
<button class="${V==='tracker'?'act':''}" onclick="sV('tracker')"><span>🔥</span>Track</button>
<button class="${V==='meals'?'act':''}" onclick="sV('meals')"><span>🍽</span>Meals</button>
<button class="${V==='prep'?'act':''}" onclick="sV('prep')"><span>🔪</span>Prep</button>
<button class="${V==='snacks'?'act':''}" onclick="sV('snacks')"><span>🍏</span>Snacks</button></div>`;
el.innerHTML=h}
</script>
</body>
</html>
